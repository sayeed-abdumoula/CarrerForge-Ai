<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerForge AI - Professional Diagnostic Tool</title>
    <style>
        :root { --brand: #002366; --accent: #0056b3; --success: #28a745; --danger: #d90429; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #fff; padding: 2.5rem; border-radius: 24px; box-shadow: 0 20px 45px rgba(0,0,0,0.1); width: 100%; max-width: 600px; border-top: 10px solid var(--brand); }
        h1 { color: var(--brand); text-align: center; margin-bottom: 5px; font-weight: 800; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 0.95rem; }
        .section { margin-bottom: 20px; }
        label { display: block; font-weight: 700; margin-bottom: 8px; color: #333; }
        input[type="file"], select { width: 100%; padding: 14px; border: 2px solid #e0e6ed; border-radius: 12px; font-size: 1rem; box-sizing: border-box; }
        .skill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: #f9fbff; padding: 18px; border-radius: 12px; border: 1px dashed var(--accent); margin-top: 10px; }
        .skill-item { display: flex; align-items: center; font-size: 0.9rem; font-weight: 600; color: #444; }
        .skill-item input { margin-right: 10px; width: 18px; height: 18px; cursor: pointer; }
        .btn-run { background: var(--brand); color: #fff; border: none; padding: 18px; border-radius: 12px; cursor: pointer; font-size: 1.1rem; width: 100%; font-weight: 700; margin-top: 20px; transition: 0.4s; }
        .btn-run:hover { background: var(--accent); transform: translateY(-2px); }
        
        /* Result Screen Styles */
        #result-screen { display: none; margin-top: 30px; animation: slideUp 0.6s ease; text-align: center; }
        .score-box { font-size: 4rem; font-weight: 900; color: var(--brand); margin-bottom: 5px; }
        .congrats-msg { color: var(--success); font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; }
        .feedback-report { background: #fdfdfe; border-left: 8px solid var(--brand); padding: 20px; border-radius: 12px; margin-top: 20px; line-height: 1.6; text-align: left; }
        .missing-label { color: var(--danger); font-weight: bold; background: #fff1f0; padding: 2px 8px; border-radius: 6px; font-size: 0.85rem; margin-right: 5px; display: inline-block; }
        .inspiration-quote { font-style: italic; color: #555; margin-top: 25px; padding: 15px; border-top: 1px solid #eee; font-size: 0.95rem; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <h1>CareerForge AI</h1>
    <p class="subtitle">Empowering Your Professional Journey</p>
    
    <div id="setup-form">
        <div class="section">
            <label>1. Upload Professional Resume</label>
            <input type="file" id="resume-upload">
        </div>

        <div class="section">
            <label>2. Targeted Career Path</label>
            <select id="path-select" onchange="refreshSkills()">
                <option value="itba">IT Business Analyst</option>
                <option value="swe">Software Engineer</option>
                <option value="ds">Data Scientist</option>
                <option value="cyb">Cybersecurity Analyst</option>
                <option value="pm">Product Manager</option>
                <option value="ux">UI/UX Designer</option>
            </select>
        </div>

        <div class="section">
            <label>3. Verify Your Core Competencies</label>
            <div class="skill-grid" id="skill-box"></div>
        </div>

        <button class="btn-run" onclick="generateReport()">Run Intelligence Analysis</button>
    </div>

    <div id="result-screen">
        <div id="congrats-area"></div>
        <div class="score-box" id="final-score">0%</div>
        <h2 id="verdict-title"></h2>
        
        <div class="feedback-report" id="report-details"></div>
        
        <div class="inspiration-quote" id="quote-box"></div>

        <button style="background: #6c757d; margin-top: 20px;" class="btn-run" onclick="location.reload()">New Assessment</button>
    </div>
</div>

<script>
    const skillData = {
        itba: ['Jira', 'BPMN', 'SQL', 'SDLC', 'Advanced Excel', 'Requirements Gathering', 'UAT', 'Documentation'],
        swe: ['JavaScript', 'React', 'Node.js', 'Git', 'API Design', 'AWS', 'Data Structures', 'Unit Testing'],
        ds: ['Python', 'SQL', 'Statistics', 'Machine Learning', 'Pandas', 'Tableau', 'Power BI', 'Deep Learning'],
        cyb: ['Linux', 'Firewall', 'Penetration Testing', 'Encryption', 'Network Security', 'SIEM', 'Risk Management', 'Ethical Hacking'],
        pm: ['Agile', 'Product Roadmap', 'Scrum', 'Market Research', 'Stakeholder Mgmt', 'KPI Analysis', 'UX Strategy', 'Backlog Grooming'],
        ux: ['Figma', 'Adobe XD', 'User Research', 'Wireframing', 'Prototyping', 'Visual Design', 'A/B Testing', 'Information Architecture']
    };

    const quotes = [
        "“Believe you can and you're halfway there.”",
        "“The only way to do great work is to love what you do.”",
        "“Your career is a marathon, not a sprint. Keep building!”",
        "“Success is the sum of small efforts repeated day in and day out.”"
    ];

    function refreshSkills() {
        const role = document.getElementById('path-select').value;
        const container = document.getElementById('skill-box');
        container.innerHTML = '';
        skillData[role].forEach(skill => {
            container.innerHTML += `
                <div class="skill-item">
                    <input type="checkbox" value="${skill}" class="s-check"> ${skill}
                </div>`;
        });
    }

    window.onload = refreshSkills;

    function generateReport() {
        const file = document.getElementById('resume-upload').files;
        const role = document.getElementById('path-select').value;
        const checks = document.querySelectorAll('.s-check');
        
        if (!file) { alert("Please upload your resume first!"); return; }
        
        let checkedSkills = [];
        checks.forEach(c => { if(c.checked) checkedSkills.push(c.value); });
        
        const allSkills = skillData[role];
        const missing = allSkills.filter(s => !checkedSkills.includes(s));
        
        // Logical Scoring
        let base = 65 + Math.floor(Math.random() * 5);
        let bonus = (checkedSkills.length / allSkills.length) * 30;
        let finalScore = Math.min(Math.round(base + bonus), 100);

        document.getElementById('setup-form').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = finalScore + "%";
        
        // 80% Check for Congratulations
        const congratsArea = document.getElementById('congrats-area');
        if(finalScore >= 80) {
            congratsArea.innerHTML = `<div class="congrats-msg">Congratulations 🎊 You're doing amazing!</div>`;
        } else {
            congratsArea.innerHTML = "";
        }

        let roleName = document.getElementById('path-select').options[document.getElementById('path-select').selectedIndex].text;
        let report = `<b>Intelligence Audit for ${roleName}:</b><br><br>`;
        
        if(missing.length > 0) {
            report += `❌ <b>Critical Skill Gaps:</b><br>`;
            missing.forEach(m => { report += `<span class="missing-label">${m}</span>`; });
            report += `<br><br>💡 <i>Advice: Mastering these will optimize your profile for the current market.</i>`;
        } else {
            report += `🚀 <b>Elite Match:</b> Your profile aligns perfectly with industry standards!`;
        }

        document.getElementById('report-details').innerHTML = report;
        document.getElementById('verdict-title').innerText = finalScore >= 80 ? "Interview Ready" : "Keep Preparing";
        
        // Add Random Inspiration Quote
        document.getElementById('quote-box').innerText = quotes[Math.floor(Math.random() * quotes.length)];
    }
</script>

</body>
</html>
